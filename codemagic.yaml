workflows:
  ios-workflow:
    name: ChessUnlock iOS
    instance_type: mac_mini_m2
    max_build_duration: 120
    working_directory: .
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Verify Runner scheme before build
        script: |
          flutter pub get
          ls -la ios/Runner.xcodeproj/xcshareddata/xcschemes
      - name: Build iOS IPA with Flutter
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
